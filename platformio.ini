; PlatformIO configuration for ESP32-S3-Ecowitt-Display
; Board: Waveshare ESP32-S3-Touch-LCD-7B (16MB Flash, 8MB PSRAM OPI)

[platformio]
src_dir = .
include_dir = .
lib_dir = .

[env]
build_src_filter = +<*.ino> +<*.cpp> +<*.c> -<unused_waveshare/> -<.pio/>

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Override board settings for Waveshare 16MB/8MB PSRAM
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; PSRAM configuration - OPI mode for 8MB PSRAM
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi

build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OCT=1
    -DLV_CONF_INCLUDE_SIMPLE=1
    -I.
    -Isrc

; Monitor settings
monitor_speed = 115200
upload_speed = 921600

; Library dependencies
lib_deps =
    lvgl/lvgl@~8.3.0
    moononournation/GFX Library for Arduino@1.3.7
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit BME280 Library@^2.2.0
    adafruit/Adafruit Unified Sensor@^1.1.0
    adafruit/Adafruit BusIO@^1.14.0
    tonywestonuk/GT911 Lite@^1.0.0
